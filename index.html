<!DOCTYPE html>
<html>
<head>
    <style>
        @font-face {
            font-family: 'SF Pro Display';
            font-style: normal;
            font-weight: 100;
            src: url("SF-Pro-Display-Bold.otf") format("opentype");
        }

        body {
            font-family: 'SF Pro Display', sans-serif;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 0px;
        }

        .square {
            width: 39%;
            aspect-ratio: 1;
            margin-left: 30px;
            background: linear-gradient(0deg, #65ae67 0%, white 50%, #65ae67 100%);
            border-radius: 1.25vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .square-text {
            font-size: 80px;
            font-weight: 500;
        }

        .qr-square {
            width: 37%;
            aspect-ratio: 1;
            margin-right: 30px;
            margin-top: 0px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: white;
        }

        .qr-code {
            max-width: 100%;
            max-height: 100%;
        }

        .tap-to-enlarge {
            font-size: 30px;
            font-weight: lighter;
            margin-top: 25px;
            margin-bottom: 30px;
        }

        .rectangle {
            height: 20%;
            display: grid;
            margin-left: 30px;
            margin-right: 30px;
            background: linear-gradient(0deg, #65ae67 0%, white 50%, #65ae67 100%);
            border-radius: 1.25vh;
            text-align: center;
            font-weight: 500;
        }

        .rectangle-text1 {
            font-size: 250px;
            margin-bottom: -40px;
            margin-top: -25px;
        }

        .rectangle-text2 {
            font-size: 78px;
        }





        .bottom-container {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .bottom-image {
            width: 100%;
        }

        .expires-text {
            font-size: 24px;
            margin-top: 20px;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 500;
            font-size: 45px;
        }

        .color-strip {
            display: flex;
            justify-content: space-between;
            width: 95%;
            margin-left: 30px;
            margin-right: 30px;
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            0% {
            opacity: 0;
        }
        49% {
            opacity: 0;
        }
        50% {
            opacity: 1;
        }
        100% {
            opacity: 1;
        }
        }

        .color-block {
            width: 34%;
            height: 50px;
        }

        .red {
            background: #92f8d3;
        }

        .green {
            background: #81726b;
        }

        .blue {
            background: #82cd56;
        }

        .datetime {
            margin-bottom: 25px;
            font-weight: 500;
            font-size: 60px;
        }

        .bip {
            margin-top: -10px;
            margin-bottom: 8px;
            font-weight: 100;
            color: red;
            font-size: 65px;
            width: 100%;
            text-align: center;
        }


    </style>
</head>
<body style="margin: 0;">
    <div class="container">
        <div class="square">
            <div class="square-text">
                OCT<br>
                2023<br>
                STUDENT
            </div>
        </div>
        <div class="qr-square">
            <img class="qr-code" src="your-qr-code-image.png" alt="QR Code">
            <div class="tap-to-enlarge">Tap to enlarge</div>
        </div>
    </div>
    <div class="bip">BUS INTERSTATE PASS</div>



    <div class="rectangle">
        <div class="rectangle-text1">3</div>
        <div class="rectangle-text2">ZONES</div>
    </div>
    <div class="bottom-container">
        <div class="datetime" id="datetime"></div>
        <div class="color-strip">
            <div class="color-block red"></div>
            <div class="color-block green"></div>
            <div class="color-block blue"></div>
        </div>
        <div class="expires-text">Expires in <span id="countdown">02:23:59:46</span></div>
        <img class="bottom-image" src="bottom.png" alt="Bottom Image">
    </div>
    <script>
        function updateCountdown() {
            const countdown = document.getElementById('countdown');
            const currentDate = new Date();
            const currentMonth = currentDate.getMonth();
            const deadlineDate = new Date(currentDate.getFullYear(), currentMonth + 1, 1, 0, 0, 0); // Deadline is set for the start of next month

            const timeRemaining = new Date(deadlineDate - currentDate);

            const days = timeRemaining.getUTCDate() - 1;
            const hours = timeRemaining.getUTCHours();
            const minutes = timeRemaining.getUTCMinutes();
            const seconds = timeRemaining.getUTCSeconds();

            countdown.textContent = `${days.toString().padStart(2, '0')}:${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function updateDateTime() {
            const datetime = document.getElementById('datetime');
            const currentDate = new Date();
            const options = {
                weekday: 'short',
                month: 'short',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            const dateTimeString = currentDate.toLocaleString('en-US', options);
            datetime.textContent = dateTimeString.replace("at", "");
        }
        updateCountdown();
        updateDateTime();
        setInterval(updateCountdown, 1000);
        setInterval(updateDateTime, 1000);
    </script>

</body>
</html>
